      <img class="case-image" src="${esc(mainImg.path)}" alt="${esc(mainImg.label)}" loading="lazy"
        onclick="openLightbox(this.src)" onerror="handleImgErr(this)" data-orig="${esc(mainImg.path)}"${fbBbox}
        onload="drawBboxOverlay(this)"
        data-bbox="${bboxJson}" data-seg="${segJson}">
      <canvas></canvas>
    </div></div>`;
  } else {
    if (images.length > 0) html += '<div class="chat-media">' + renderImagesHtml(images) + '</div>';
  }

  const embeddedMc = trySplitQuestionWithEmbeddedOptions(item, fmt);

  if (hasQ) {
    html += '<div class="chat-row"><div class="chat-ava chat-ava-q">Q</div>';
    let qBody = embeddedMc ? embeddedMc.stem : getQuestionText(item, fmt);
    if (imgOpts) qBody = qBody.replace(/<image_\d+>/g, '').trim();
    html += '<div class="chat-bbl chat-bbl-q">' + renderMd(wrapEmbeddedCode(qBody)) + '</div></div>';
  }

  if (imgOpts) {
    const answerRaw = item[fmt.answerField];
    const answer = Array.isArray(answerRaw) ? answerRaw[0] : answerRaw;
    html += renderImageChoices(item, imgOpts.optionImgs, answer);
  } else if (fmt.choicesField) html += renderChoicesHtml(item, fmt);
  else if (embeddedMc) html += renderChoicesHtml(item, fmt, embeddedMc.options);

  if (hasAns) {
    const ac = renderAnswerHtml(item, fmt);
    if (ac) {
      html += '<div class="chat-row"><div class="chat-ava chat-ava-a">A</div>';
      html += '<div class="chat-bbl chat-bbl-a">' + ac + '</div></div>';
    }
  }

  html += '</div>';

  const ex = renderExplanationHtml(item);
  const si = renderSolutionImagesHtml(item, fmt);
  const co = renderCotHtml(item, fmt);
  const aq = renderAdditionalQA(item);
  if (ex || si || co || aq) {
    html += '<div class="card-details-sec">' + ex + si + co + aq + '</div>';
  }

  if (item.prompt && fmt.questionField !== 'prompt' && typeof item.prompt === 'string') {
    const qText = item[fmt.questionField] || '';
    const pText = item.prompt;
    let showPrompt = true;
    if (qText) {
      if (pText.includes(qText)) {
        showPrompt = false;
      } else {
        const qWords = qText.toLowerCase().split(/\s+/).filter(w => w.length > 3);
        if (qWords.length > 0) {
          const pLower = pText.toLowerCase();
          const matched = qWords.filter(w => pLower.includes(w)).length;
          if (matched / qWords.length > 0.6) showPrompt = false;
        }
      }
    }
    if (showPrompt) {
      let promptHtml;
      if (pText.length > 400) {
        promptHtml = '<div class="md-truncate">' + renderMd(pText) + '</div><button class="expand-btn" onclick="toggleExpand(this)">Expand</button>';
      } else {
        promptHtml = renderMd(pText);
      }
      html += '<div class="answer-block" style="border-left-color:var(--blue);margin-top:12px"><div class="answer-label">Prompt</div><div class="answer-text" style="font-size:0.82rem">' + promptHtml + '</div></div>';
    }
  }
  if (Array.isArray(item.scoring_points) && item.scoring_points.length > 0) {
    html += '<div class="scoring-section"><div class="scoring-title">Scoring Points</div><div class="scoring-list">';
    for (const p of item.scoring_points) {
      html += '<div class="scoring-point"><span class="scoring-dot" aria-hidden="true"></span><div class="scoring-point-md">' + renderMd(p) + '</div></div>';
    }
    html += '</div></div>';
  }

  const gridKeys = Object.keys(item).filter(k => {
    const v = item[k];
    return Array.isArray(v) && v.length > 0 && Array.isArray(v[0]) && v[0].length > 0 && typeof v[0][0] === 'number';
  });
  if (gridKeys.length > 0) {
    html += '<div class="grids-row" style="margin-top:12px">';
    for (const k of gridKeys) html += renderGridHtml(item[k], k);
    html += '</div>';
  }

  const extra = getExtraFields(item, fmt);
  if (extra.length > 0) {
    html += '<div class="extra-fields">';
    for (const [k, v] of extra) {
      const display = typeof v === 'number' ? v.toLocaleString() : String(v);
      if (typeof v === 'string' && /^https?:\/\//.test(v)) {
        html += `<span class="extra-field"><strong>${esc(k)}:</strong> <a href="${esc(v)}" target="_blank" rel="noopener" style="color:var(--accent-light);text-decoration:none">${esc(display.length > 60 ? display.slice(0,57) + '...' : display)}</a></span>`;
      } else {
        html += `<span class="extra-field"><strong>${esc(k)}:</strong> ${esc(display)}</span>`;
      }
    }
    html += '</div>';
  }

  const longTexts = getLongTextFields(item, fmt);
  if (longTexts.length > 0) {
    for (const [k, v] of longTexts) {
      html += '<div class="answer-block" style="border-left-color:var(--text-muted);margin-top:12px">';
      html += `<div class="answer-label">${esc(k)}</div>`;
      if (v.length > 300) {
        html += '<div class="answer-text md-truncate" style="font-size:0.82rem">' + renderMd(v) + '</div><button class="expand-btn" onclick="toggleExpand(this)">Expand</button>';
      } else {
        html += '<div class="answer-text" style="font-size:0.82rem">' + renderMd(v) + '</div>';
      }
      html += '</div>';
    }
  }

  html += '</div></div>';
  return html;
}

function renderClassificationGrid(items, fmt) {
  let html = '<div class="classify-grid">';
  items.forEach((item, i) => {
    const images = collectImages(item, fmt, i);
    const imgSrc = images.length > 0 ? images[0].path : null;
    const fb = images.length > 0 ? hfRowFallbackDataAttr(images[0]) : '';
    html += `<div class="classify-item">`;
    if (imgSrc) html += `<img src="${esc(imgSrc)}" alt="Case ${i+1}" loading="lazy" onclick="openLightbox(this.src)" onerror="handleImgErr(this)" data-orig="${esc(imgSrc)}"${fb}>`;

    let label = '';
    if (fmt.answerField) label = item[fmt.answerField] ?? '';
    if (!label && item.label !== undefined && item.label !== null) label = item.label;
    if (label !== '') {
      html += `<div class="classify-label">Label: ${esc(String(label))}</div>`;
    }

    const infoFields = Object.entries(item).filter(([k, v]) => {
      if (k === fmt.answerField || k === 'label') return false;
      if (SKIP_FIELDS.has(k)) return false;
      if (fmt.imageFields.includes(k) || fmt.imageArrayFields.includes(k)) return false;
      if (v === null || v === undefined) return false;
      if (typeof v === 'object') return false;
      if (typeof v === 'string' && v.length > 150) return false;
      return true;
    });
    for (const [k, v] of infoFields) {
      const display = typeof v === 'number' ? v.toLocaleString() : String(v);
      html += `<div style="font-size:0.78rem;color:var(--text-dim);margin-top:3px;text-align:left;line-height:1.5"><strong>${esc(k)}:</strong> ${esc(display)}</div>`;
    }

    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderGenericCard(item, idx) {
  let html = `<div class="case-card"><div class="card-header"><span class="card-num">#${idx + 1}</span></div>`;
  html += `<div class="card-body"><div class="json-display">${esc(JSON.stringify(item, null, 2))}</div></div></div>`;
  return html;
}

function renderArcPuzzleCard(item, idx) {
  let html = `<div class="case-card"><div class="card-header">`;
  html += `<span class="card-num">#${idx + 1}</span>`;
  html += `<span class="card-badge" style="background:rgba(99,102,241,.1);color:var(--accent-light);border:1px solid rgba(99,102,241,.3)">ARC Puzzle</span>`;
  if (item.id) html += `<span class="card-id">${esc(item.id)}</span>`;
  html += '</div><div class="card-body">';
  html += '<div class="arc-section"><div class="arc-section-title">Training Examples</div>';
  for (let i = 0; i < item.train.length; i++) {
    html += '<div class="arc-example">';
    html += `<div class="arc-pair">${renderGridHtml(item.train[i].input, 'Input ' + (i+1))}</div>`;
    html += '<div class="arc-arrow">\u2192</div>';
    html += `<div class="arc-pair">${renderGridHtml(item.train[i].output, 'Output ' + (i+1))}</div>`;
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="arc-section"><div class="arc-section-title">Test</div>';
  for (let i = 0; i < item.test.length; i++) {
    html += '<div class="arc-example">';
    html += `<div class="arc-pair">${renderGridHtml(item.test[i].input, 'Test Input')}</div>`;
    html += '<div class="arc-arrow">\u2192</div>';
    if (item.test[i].output) {
      html += `<div class="arc-pair">${renderGridHtml(item.test[i].output, 'Expected Output')}</div>`;
    } else {
      html += '<div class="arc-pair"><div class="grid-label">Output</div><div class="arc-unknown">?</div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  html += '</div></div>';
  return html;
}

function renderArcSubmissionCard(puzzleId, attempts, subInfo, idx, puzzleData) {
  let html = `<div class="case-card"><div class="card-header">`;
  html += `<span class="card-num">#${idx + 1}</span>`;
  html += `<span class="card-badge" style="background:rgba(99,102,241,.1);color:var(--accent-light);border:1px solid rgba(99,102,241,.3)">ARC Submission</span>`;
  if (subInfo && subInfo.status) {
    const isOk = subInfo.status === 'success';
    html += `<span class="card-badge" style="background:${isOk?'rgba(5,150,105,.1)':'rgba(239,68,68,.1)'};color:${isOk?'var(--green)':'var(--red)'};border:1px solid ${isOk?'rgba(5,150,105,.3)':'rgba(239,68,68,.3)'}">${esc(subInfo.status)}</span>`;
  }
  html += `<span class="card-id">${esc(puzzleId)}</span>`;
  html += '</div><div class="card-body">';
  if (subInfo) {
    html += '<div class="arc-meta">';
    if (subInfo.submission_id) html += `<span class="arc-meta-item"><strong>Submission:</strong> ${esc(subInfo.submission_id)}</span>`;
    if (subInfo.duration_seconds != null) html += `<span class="arc-meta-item"><strong>Duration:</strong> ${subInfo.duration_seconds.toFixed(1)}s</span>`;
    html += '</div>';
  }
  if (puzzleData && puzzleData.train.length > 0) {
    html += '<div class="arc-section"><div class="arc-section-title">Training Examples</div>';
    for (let i = 0; i < puzzleData.train.length; i++) {
      html += '<div class="arc-example">';
      html += `<div class="arc-pair">${renderGridHtml(puzzleData.train[i].input, 'Input ' + (i+1))}</div>`;
      html += '<div class="arc-arrow">\u2192</div>';
      html += `<div class="arc-pair">${renderGridHtml(puzzleData.train[i].output, 'Output ' + (i+1))}</div>`;
      html += '</div>';
    }
    html += '</div>';
  }
  html += '<div class="arc-section"><div class="arc-section-title">Test & Model Attempt</div>';
  const testInputs = (puzzleData && puzzleData.testInputs) || [];
  const numTests = Math.max(testInputs.length, attempts.length);
  for (let t = 0; t < numTests; t++) {
    html += '<div class="arc-example">';
    if (testInputs[t]) {
      html += `<div class="arc-pair">${renderGridHtml(testInputs[t], 'Test Input' + (numTests > 1 ? ' ' + (t+1) : ''))}</div>`;
      html += '<div class="arc-arrow">\u2192</div>';
    }
    const att = attempts[t];
    if (att) {
      for (const [key, grid] of Object.entries(att)) {
        if (Array.isArray(grid) && grid.length > 0 && Array.isArray(grid[0])) {
          html += `<div class="arc-pair">${renderGridHtml(grid, key.replace(/_/g, ' '))}</div>`;
        }
      }
    }
    html += '</div>';
  }
  html += '</div>';
  html += '</div></div>';
  return html;
}

function renderCases(fmt) {
  const container = document.getElementById('casesContainer');
  if (fmt.type === 'empty') {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>No samples</h3><p>Sample data for this dataset has not been added yet.</p></div>';
    return;
  }

  let html = '';

  if (fmt.type === 'arc-puzzle') {
    html += `<div class="cases-info">${fmt.items.length} puzzles · ARC Puzzle</div>`;
    for (let i = 0; i < fmt.items.length; i++) html += renderArcPuzzleCard(fmt.items[i], i);
  } else if (fmt.type === 'arc-submission') {
    let count = 0;
    let cardsHtml = '';
    for (const attemptItem of fmt.arcAttemptItems) {
      for (const [puzzleId, attempts] of Object.entries(attemptItem)) {
        if (!/^[0-9a-f]{6,}$/.test(puzzleId)) continue;
        const subInfo = (fmt.arcSubmissionItems || []).find(s => s.puzzle_id === puzzleId);
        const pzData = (fmt.puzzleDataMap || {})[puzzleId] || null;
        cardsHtml += renderArcSubmissionCard(puzzleId, attempts, subInfo, count++, pzData);
      }
    }
    html += `<div class="cases-info">${count} puzzle submissions · ARC Submission</div>` + cardsHtml;
  } else {
    html += `<div class="cases-info">${fmt.items.length} samples · format: ${fmt.type}</div>`;
    if (fmt.type === 'image-classification') {
      html += renderClassificationGrid(fmt.items, fmt);
    } else if (fmt.type === 'generic') {
      for (let i = 0; i < fmt.items.length; i++) html += renderGenericCard(fmt.items[i], i);
    } else {
      for (let i = 0; i < fmt.items.length; i++) html += renderCard(fmt.items[i], fmt, i);
    }
  }
  container.innerHTML = html;
  doMath(container);
}

function renderHeader(info) {
  const el = document.getElementById('headerContent');
  let html = `<div class="dataset-title">${esc(datasetName)}</div>`;
  if (info) {
    if (info.brief) html += `<div class="dataset-brief">${esc(info.brief)}</div>`;
    html += '<div class="dataset-meta">';
    if (info.category) html += catBadge(info.category);
    if (subtasks.length === 1) html += `<span class="card-badge">1 subtask</span>`;
    html += '</div>';
  }
  el.innerHTML = html;
  document.title = `${datasetName} - Samples`;
}

function renderTabs() {
  const container = document.getElementById('tabsContainer');
  if (subtasks.length <= 1) { container.innerHTML = ''; return; }
  const curLabel = esc(formatSubtask(currentSubtask));
  let html = `<div class="subtask-bar"><p class="cases-info">${subtasks.length} subtasks · ${curLabel}</p><div class="subtask-tabs" role="tablist">`;
  subtasks.forEach((sub, i) => {
    const on = sub === currentSubtask;
    html += `<button type="button" role="tab" aria-selected="${on}" class="tab-btn${on ? ' active' : ''}" onclick="switchTab(${i})">${esc(formatSubtask(sub))}</button>`;
  });
  html += '</div></div>';
  container.innerHTML = html;
}

async function loadSubtask(subtask) {
  currentSubtask = subtask;
  renderTabs();
  const container = document.getElementById('casesContainer');

  if (dataCache[subtask]) {
    renderCases(dataCache[subtask]);
    return;
  }

  container.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading samples…</p></div>';

  // Try local paths first (exact name, then '/' replaced with '_'), then fall back to HuggingFace
  const localName2 = datasetName.replace(/\//g, '_');
  const sr = samplesRootPrefix();
  const localCandidates = [...new Set([datasetName, localName2])].map(n =>
    `${sr}${encodeURIComponent(n)}/${encodeURIComponent(subtask)}/data.json`
  );
  const hfUrl = `${SAMPLES_BASE}/${encodeURIComponent(datasetName)}/${encodeURIComponent(subtask)}/data.json`;
  const allUrls = [...localCandidates, hfUrl];

  let lastErr = null;
  for (const url of allUrls) {
    try {
      const resp = await fetch(url);
      if (!resp.ok) { lastErr = new Error(`HTTP ${resp.status}`); continue; }
      const raw = await resp.json();
      if (url.startsWith(SAMPLES_BASE)) {
        localDatasetName = '';
      } else {
        localDatasetName = localDatasetNameFromSamplesUrl(url);
      }
      const items = Array.isArray(raw) ? raw : [raw];
      const fmt = detectFormat(items);
      dataCache[subtask] = fmt;
      renderCases(fmt);
      return;
    } catch (e) {
      lastErr = e;
    }
  }

  container.innerHTML = `<div class="error-state"><h3>Failed to load</h3><p>${esc(lastErr ? lastErr.message : 'Unknown error')}</p><button class="retry-btn" onclick="loadSubtask('${esc(subtask)}')">Retry</button></div>`;
}

function switchTab(idx) {
  loadSubtask(subtasks[idx]);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function toggleExpand(btn) {
  const target = btn.previousElementSibling;
  if (target.classList.contains('md-truncate')) {
    if (target.classList.toggle('expanded')) {
      btn.textContent = 'Collapse';
    } else {
      btn.textContent = 'Expand';
    }
  } else if (target.style.display === 'none') {
    target.style.display = '';
    btn.textContent = 'Collapse';
  } else {
    target.style.display = 'none';
    btn.textContent = 'Expand';
  }
}

function tryHfRowImageFallback(img, payload) {
  var parts = payload.split('::');
  if (parts.length !== 4) return Promise.resolve(false);
  var ds, cfg, spl, off;
  try {
    ds = decodeURIComponent(parts[0]);
    cfg = decodeURIComponent(parts[1]);
    spl = decodeURIComponent(parts[2]);
    off = parseInt(decodeURIComponent(parts[3]), 10);
  } catch (e1) { return Promise.resolve(false); }
  if (!ds || isNaN(off)) return Promise.resolve(false);
  var url = HF_DATASETS_ROWS_API + '?dataset=' + encodeURIComponent(ds) + '&config=' + encodeURIComponent(cfg) + '&split=' + encodeURIComponent(spl) + '&offset=' + off + '&length=1';
  return fetch(url)
    .then(function(resp) { if (!resp.ok) throw new Error('rows'); return resp.json(); })
    .then(function(data) {
      var row = data.rows && data.rows[0] && data.rows[0].row;
      var im = row && row.image;
      var src = im && typeof im === 'object' && im.src;
      if (!src) throw new Error('no src');
      img.src = src;
      img.dataset.orig = src;
      img.style.display = '';
      var nx = img.nextElementSibling;
      if (nx && nx.classList && nx.classList.contains('img-err-ph')) nx.remove();
      return true;
    })
    .catch(function() { return false; });
}

function handleImgErr(img) {
  var fb = img.dataset.hfRowFallback || '';
  if (fb && !img.dataset.hfFbTried) {
    img.dataset.hfFbTried = '1';
    tryHfRowImageFallback(img, fb).then(function(ok) {
      if (!ok) handleImgErr(img);
    });
    return;
  }
  var r = parseInt(img.dataset.retry || '0');
  if (r < 3) {
    img.dataset.retry = r + 1;
    var s = img.dataset.orig || img.src.split('?')[0];
    setTimeout(function() { img.src = s + (s.indexOf('?') >= 0 ? '&' : '?') + '_r=' + Date.now(); }, 600 * (r + 1));
  } else {
    img.style.display = 'none';
    var ph = document.createElement('div');
    ph.className = 'img-err-ph';
    ph.innerHTML = '<div class="ie-icon">\u{1F5BC}\uFE0F</div><div style="font-size:.76rem;color:var(--text-muted)">Image failed to load</div><button class="img-retry-btn" onclick="retryImg(this)">Retry</button>';
    ph.dataset.src = img.dataset.orig || img.src.split('?')[0];
    img.parentNode.insertBefore(ph, img.nextSibling);
  }
}

function drawBboxOverlay(img) {
  var wrap = img.closest('.bbox-overlay-wrap');
  if (!wrap) return;
  var canvas = wrap.querySelector('canvas');
  if (!canvas) return;
  var natW = img.naturalWidth, natH = img.naturalHeight;
  if (!natW || !natH) return;
  canvas.width = natW;
  canvas.height = natH;
  var ctx = canvas.getContext('2d');

  var segStr = img.dataset.seg;
  if (segStr) {
    try {
      var seg = JSON.parse(segStr);
      if (seg.length >= 6) {
        ctx.beginPath();
        ctx.moveTo(seg[0], seg[1]);
        for (var i = 2; i < seg.length; i += 2) {
          ctx.lineTo(seg[i], seg[i + 1]);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(99, 102, 241, 0.2)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(99, 102, 241, 0.7)';
        ctx.lineWidth = Math.max(2, natW / 200);
        ctx.stroke();
      }
    } catch (e) {}
  }

  var bboxStr = img.dataset.bbox;
  if (bboxStr) {
    try {
      var bbox = JSON.parse(bboxStr);
      if (bbox.length === 4) {
        var lw = Math.max(2, natW / 150);
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = lw;
        ctx.setLineDash([lw * 3, lw * 2]);
        ctx.strokeRect(bbox[0], bbox[1], bbox[2], bbox[3]);
        ctx.setLineDash([]);
      }
    } catch (e) {}
  }
}

function retryImg(btn) {
  var ph = btn.closest('.img-err-ph');
  var img = ph.previousElementSibling;
  if (img && img.tagName === 'IMG') {
    img.dataset.retry = '0';
    delete img.dataset.hfFbTried;
    img.style.display = '';
    img.src = ph.dataset.src + '?' + Date.now();
    ph.remove();
  }
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  datasetName = params.get('name');
  if (!datasetName) {
    document.getElementById('headerContent').innerHTML = '<div class="dataset-title">No dataset selected</div>';
    document.getElementById('casesContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><h3>Pick a dataset from the list</h3><p><a href="index.html" style="color:var(--accent-light)">Back to list</a></p></div>';
    return;
  }

  try {
    const cacheBust = `?t=${Date.now()}`;
    const [manifestResp, siteResp] = await Promise.all([
      fetch('data/cases-manifest.json' + cacheBust, { cache: 'no-store' }),
      fetch('data/benchmarks.json' + cacheBust, { cache: 'no-store' })
    ]);
    manifest = await manifestResp.json();
    siteData = await siteResp.json();
  } catch (e) {
    document.getElementById('headerContent').innerHTML = `<div class="dataset-title">${esc(datasetName)}</div>`;
    document.getElementById('casesContainer').innerHTML = `<div class="error-state"><h3>Failed to load config</h3><p>${esc(e.message)}</p><button class="retry-btn" onclick="init()">Retry</button></div>`;
    return;
  }

  const info = siteData.find(d => d.name === datasetName);
  subtasks = manifest[datasetName] || [];

  renderHeader(info);

  if (subtasks.length === 0) {
    document.getElementById('casesContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><h3>No samples</h3><p>Sample data for this dataset has not been added yet.</p></div>';
    return;
  }

  renderTabs();
  loadSubtask(subtasks[0]);
}
